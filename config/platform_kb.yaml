platforms:
  greenhouse:
    scraper_key: greenhouse_api
    strategy: public_api
    detection_signals:
    - '"greenhouse.io" in domain'
    - '"grnh.se" in any href'
    - '"gh_jid" in page source'
    api_pattern: https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
    slug_extraction: first_path_segment
    known_companies: []
    date_added: '2026-06-09'
  lever:
    scraper_key: lever_api
    strategy: public_api
    detection_signals:
    - '"lever.co" in domain'
    - '"jobs.lever.co" in any href'
    api_pattern: https://api.lever.co/v0/postings/{slug}?mode=json
    slug_extraction: first_path_segment
    known_companies: []
    date_added: '2026-06-09'
  smartrecruiters:
    scraper_key: smartrecruiters
    strategy: public_api
    detection_signals:
    - '"smartrecruiters.com" in domain'
    - '"smartrecruiters" in page source'
    api_pattern: https://api.smartrecruiters.com/v1/companies/{slug}/postings
    slug_extraction: first_path_segment
    known_companies: []
    date_added: '2026-06-09'
  workday:
    scraper_key: workday
    strategy: json_api_post
    detection_signals:
    - '"myworkdayjobs.com" in domain'
    - '"workday.com/en-US/" in url'
    - '"wd1.myworkdayjobs" in url'
    - '"wd5.myworkdayjobs" in url'
    api_pattern: https://{host}/wday/cxs/{tenant}/{site}/jobs
    detail_pattern: https://{host}/wday/cxs/{tenant}/{site}{externalPath}
    slug_extraction: tenant_subdomain_plus_site_path
    notes: tenant = first subdomain label; site = path segment after the locale (e.g.
      /en-US/).
    known_companies:
    - globalhr.wd5.myworkdayjobs.com
    - fanniemae.wd1.myworkdayjobs.com
    - geico.wd1.myworkdayjobs.com
    date_added: '2026-06-09'
  icims:
    scraper_key: icims
    strategy: id_range_walking
    detection_signals:
    - '".icims.com" in domain'
    - '"iCIMS_JobContent" in page source'
    - '"/jobs/{id}/job/job" url pattern'
    job_detail_pattern: /jobs/{id}/job
    miss_detection: redirect to jobs/intro or jobs/search
    known_companies: []
    date_added: '2026-06-09'
  avature:
    scraper_key: avature
    strategy: static_paginated_html
    detection_signals:
    - '"avature.portal.id" in html meta'
    - '"JobDetail?jobId=" in any href'
    - '"/jobs/search/" url pattern with jobOffset param'
    pagination_param: jobOffset
    pagination_step: 20
    job_detail_pattern: /jobs/JobDetail?jobId={id}
    known_companies:
    - careers.boozallen.com
    - apply.deloitte.com
    date_added: '2026-06-09'
