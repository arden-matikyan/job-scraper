# Per-scraper tunable settings. Every value is optional; scrapers fall back to
# the `defaults` block (or hard-coded defaults) when a key is absent.

defaults:
  request_timeout: 30
  max_retries: 3
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  embed_jobs: true        # compute the (currently unused) nomic embedding per job; false skips it for speed
  extract_workers: 4      # concurrent llama3.2 extraction workers (1 = sequential).
                          # For real parallelism also start Ollama with OLLAMA_NUM_PARALLEL>=this value.
  company_workers: 3      # parallel company scrapers; 1 = sequential (safe default for WAF-sensitive sites)

# Title hard-exclude filter (pipeline-level): a NEW job whose title contains any of
# these terms (whole-word, case-insensitive) is dropped BEFORE any LLM extraction.
# Set to [] to disable. Terms are matched as whole words so "Sr" won't match "Sriracha".
title_exclude:
  - Manager
  - Staff
  - Stf
  - Lead
  - Principle
  - Principal
  - Sr
  - Sr.
  - Senior
  - Director
  # NOTE: bare numeric/level tokens ("3","4","5","L3"–"L6") were removed on purpose.
  # As whole words they discarded valid early-career roles (e.g. "Software Engineer 3"),
  # and we'd rather keep a false positive than drop a real job. Genuine senior roles are
  # still caught downstream by the experience filter (">=3 years required").
  - "Level III"
  - "III"
  - "Civil"
  - Technichian

# Case-SENSITIVE title hard-exclude: same whole-word matching as title_exclude, but
# the term must match exactly as written (so "IV" fires on "Engineer IV" but not on a
# lowercase "iv", and "L3" won't match "l3"). Use this for short uppercase level codes
# / roman numerals where a case-insensitive match would cause false positives.
title_exclude_cs:
  - "IV"
  - "L3"
  - "L4"
  - "L5"
  - "L6"


# Non-US location filter (pipeline-level + filter stage): when true, a job whose
# scraper/extracted location is recognizably non-US is dropped. Deny-list with
# fail-open semantics — only positively-foreign locations are dropped; unknown or
# US-marked locations are always kept (see non_us_location in scrapers/base.py).
# `location_deny_extra` adds extra foreign substrings (e.g. UK county names) for the
# residual "City, County" rows that carry no country code.
us_only: true
location_deny_extra: []

# Keyword pre-filter (pipeline-level): a NEW job whose title contains none of these
# (case-insensitive substring) is skipped BEFORE any LLM extraction.
# Set to [] to disable (process everything). Override per-run with `run --keywords`.
keyword_filter:
  - software
  - developer
  - Data
  - " ai "
  - " ml "
  - SWE 
  - SW 
  - machine learning
  - artificial intelligence
  - generative
  - full stack
  - fullstack
  - full-stack
  - backend
  - back end 
  - back-end
  - systems
  - system

greenhouse_api:
  content: true

lever_api: {}

smartrecruiters:
  page_limit: 100

workday:
  page_limit: 20
  max_pages: 200          # safety cap: max pagination pages (page_limit jobs each)

icims:
  scan_window: 300        # scan +/- this many ids around the highest seen id
  max_consecutive_misses: 150

icims_javascript:
  max_listing_pages: 50   # max search result pages to paginate (stops early when no new IDs)
  nav_timeout_ms: 45000

avature:
  job_records_per_page: 20
  max_pages: 100

static_html:
  max_pages: 20
  link_patterns:
    - "/jobs/"
    - "/careers/"
    - "/positions/"
    - "/openings/"

javascript_rendered:
  wait_until: networkidle
  max_pages: 20
  profile_dir: "~/.job-scraper/browser-profile"

leidos:
  headless: false          # careers.leidos.com is behind Cloudflare's managed
                           # challenge — a headful browser is required to clear it.
  max_pages: 25             # listing pages to walk (25 jobs each); stops early when empty
  nav_timeout_ms: 60000
  profile_dir: "~/.job-scraper/browser-profile"

eightfold:
  max_pages: 200            # 10 jobs/page; stops early at data.count (CACI ~979, MS ~214)

lockheed:
  max_pages: 200            # 15 jobs/page; 200 pages = 3000 jobs (software search ~2200)

ibm:
  headless: false          # careers.ibm.com is behind an AWS WAF challenge — a
                           # headful browser is required to clear it.
  max_pages: 40            # listing pages to walk; stops early when a page is empty
  records_per_page: 48     # jobs per listing page (drives the jobOffset step)
  nav_timeout_ms: 60000
  profile_dir: "~/.job-scraper/browser-profile"

oracle:
  page_limit: 25           # API page size; "Show more results" = one offset bump
  max_pages: 200           # safety cap on pagination (25 jobs/page)
  site_number: CX_1        # ORC Candidate Experience site id (Oracle's own site)

lmi:
  headless: true           # headless clears the AWS WAF once the profile is warm;
                           # set false if it starts demanding an interactive captcha
  max_pages: 50            # listing pages to walk (pr=0..N, 20 jobs/page); stops early when empty
  nav_timeout_ms: 45000
  spa_wait_ms: 2500        # ms to wait after navigation for the content iframe to render
  profile_dir: "~/.job-scraper/browser-profile"

saic:
  headless: false          # jobs.saic.com is behind Cloudflare's managed
                           # challenge — a headful browser is required to clear it.
  max_pages: 50            # listing pages to walk (25 jobs each); stops early when empty
  nav_timeout_ms: 60000
  profile_dir: "~/.job-scraper/browser-profile"

phenom_api:
  max_pages: 300           # 10 jobs/page; stops early at totalCount

freddiemac:
  headless: true           # no Cloudflare/WAF on careers.freddiemac.com
  max_jobs: 200            # total job cap (10/listing page)
  max_pages: 30            # safety cap on UI "next page" clicks (stops early when a page adds nothing new)
  sort_label: "Most recent"  # on-page sort; the default "Most relevant" returns a rotating random subset
  nav_timeout_ms: 45000
  spa_wait_ms: 10000       # ms to wait after navigation / sort / next-page for the SPA to re-render
  detail_wait_ms: 6000     # ms to wait on each job detail page
  profile_dir: "~/.job-scraper/browser-profile"
